<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casino Dealer Training</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dealer" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <link href="/style.css" rel="stylesheet">
</head>
<body>

  <!-- Portrait blocking overlay -->
  <div id="portrait-block" aria-hidden="true">
    <div class="portrait-content">
      <div class="portrait-icon">↻</div>
      <p class="portrait-title">가로 모드로 사용해주세요</p>
      <p class="portrait-sub">기기를 가로로 돌려주세요.<br>화면 회전 잠금이 설정된 경우 해제해주세요.</p>
    </div>
  </div>

  <!-- Top bar (always visible) -->
  <div class="top-bar">
    <button class="hamburger-btn" onclick="App.toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <button class="home-btn" onclick="App.navigate('home')" aria-label="Home">⌂</button>
  </div>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" onclick="App.closeSidebar()"></div>

  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-brand" onclick="App.navigate('home')">
        <span class="sidebar-brand-icon">♠</span>
        Dealer Training
      </div>
      <nav class="sidebar-nav">

        <div class="sidebar-section">
          <div class="sidebar-section-title">🃏 Baccarat</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="baccarat" data-mode="tutorial"
             onclick="App.navigate('baccarat','tutorial')">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="baccarat" data-mode="simulation"
             onclick="App.navigate('baccarat','simulation')">Drawing Practice</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="baccarat" data-mode="paysim"
             onclick="App.navigate('baccarat','paysim')">Payout Practice</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">♠ Blackjack</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="blackjack" data-mode="tutorial"
             onclick="App.navigate('blackjack','tutorial')" style="display:none">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="blackjack" data-mode="simulation"
             onclick="App.navigate('blackjack','simulation')">Card Counting Practice</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">🎡 Roulette</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="roulette" data-mode="tutorial"
             onclick="App.navigate('roulette','tutorial')" style="display:none">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="roulette" data-mode="paysim"
             onclick="App.navigate('roulette','paysim')">Payout Practice</a>
        </div>

        <div class="sidebar-section" style="display:none">
          <div class="sidebar-section-title">🂡 Poker</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="poker" data-mode="tutorial"
             onclick="App.navigate('poker','tutorial')">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="isp"
             onclick="App.navigate('poker','isp')">ISP</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="tcp"
             onclick="App.navigate('poker','tcp')">TCP</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="thp"
             onclick="App.navigate('poker','thp')">THP</a>
        </div>

      </nav>
    </aside>

    <main id="app" class="main-content"></main>

  </div>

  <script src="/main.js"></script>
  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }

    // Portrait blocking
    const block = document.getElementById('portrait-block');
    function checkOrientation() {
      const portrait = window.innerHeight > window.innerWidth;
      block.style.display = portrait ? 'flex' : 'none';
    }
    checkOrientation();
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 100));
  </script>
</body>
</html>
