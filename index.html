<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casino Dealer Training</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dealer" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <link href="/style.css" rel="stylesheet">
</head>
<body>

  <!-- Portrait blocking overlay -->
  <div id="portrait-block" aria-hidden="true">
    <div class="portrait-content">
      <div class="portrait-icon">↻</div>
      <p class="portrait-title">가로 모드로 사용해주세요</p>
      <p class="portrait-sub">기기를 가로로 돌려주세요.<br>화면 회전 잠금이 설정된 경우 해제해주세요.</p>
    </div>
  </div>

  <!-- Top bar (always visible) -->
  <div class="top-bar">
    <button class="hamburger-btn" onclick="App.toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <button class="home-btn" onclick="App.navigate('home')" aria-label="Home">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
        <polyline points="9 22 9 13 15 13 15 22"/>
      </svg>
    </button>
    <span class="top-bar-title" id="top-bar-title" style="display:none">
      <span class="top-bar-card-icon">
        <span class="top-bar-hero-cards">
          <div class="hcard red" style="transform:rotate(-18deg) translate(-6px,8px)">
            <div class="hcard-corner">A<br>♥</div>
            <div class="hcard-center">♥</div>
          </div>
          <div class="hcard" style="transform:rotate(5deg) translate(6px,-10px)">
            <div class="hcard-corner">K<br>♠</div>
            <div class="hcard-center">♠</div>
          </div>
          <div class="hcard red" style="transform:rotate(22deg) translate(20px,6px)">
            <div class="hcard-corner">Q<br>♦</div>
            <div class="hcard-center">♦</div>
          </div>
        </span>
      </span>
      Casino Dealer <span class="gold">Training System</span>
    </span>
  </div>

  <!-- Sidebar overlay -->
  <div id="sidebar-overlay" onclick="App.closeSidebar()"></div>

  <div class="app-shell">

    <aside class="sidebar">
<nav class="sidebar-nav">

        <div class="sidebar-section">
          <div class="sidebar-section-title">BACCARAT</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="baccarat" data-mode="simulation"
             onclick="App.navigate('baccarat','simulation')">Card Drawing</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="baccarat" data-mode="paysim"
             onclick="App.navigate('baccarat','paysim')">Payout</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">BLACKJACK</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="blackjack" data-mode="simulation"
             onclick="App.navigate('blackjack','simulation')">Card Counting</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">ROULETTE</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="roulette" data-mode="paysim"
             onclick="App.navigate('roulette','paysim')">Payout</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">POKER</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="thp"
             onclick="App.navigate('poker','thp')">THP Ranking</a>
        </div>

      </nav>
    </aside>

    <main id="app" class="main-content"></main>

  </div>

  <script src="/main.js"></script>
  <script>
    // Service Worker registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }

    // Portrait blocking
    const block = document.getElementById('portrait-block');
    function checkOrientation() {
      const portrait = window.innerHeight > window.innerWidth;
      block.style.display = portrait ? 'flex' : 'none';
    }
    checkOrientation();
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', () => setTimeout(checkOrientation, 100));
  </script>
</body>
</html>
