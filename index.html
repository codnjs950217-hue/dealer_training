<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Casino Dealer Training</title>
  <link href="/style.css" rel="stylesheet">
</head>
<body>
  <div class="app-shell">

    <aside class="sidebar">
      <div class="sidebar-brand" onclick="App.navigate('home')">
        <span class="sidebar-brand-icon">♠</span>
        Dealer Training
      </div>
      <nav class="sidebar-nav">

        <div class="sidebar-section">
          <div class="sidebar-section-title">🃏 Baccarat</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="baccarat" data-mode="tutorial"
             onclick="App.navigate('baccarat','tutorial')">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="baccarat" data-mode="simulation"
             onclick="App.navigate('baccarat','simulation')">Drawing Practice</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="baccarat" data-mode="paysim"
             onclick="App.navigate('baccarat','paysim')">Payout Practice</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">♠ Blackjack</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="blackjack" data-mode="tutorial"
             onclick="App.navigate('blackjack','tutorial')">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="blackjack" data-mode="simulation"
             onclick="App.navigate('blackjack','simulation')">Card Counting Practice</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">🎡 Roulette</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="roulette" data-mode="tutorial"
             onclick="App.navigate('roulette','tutorial')">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="roulette" data-mode="paysim"
             onclick="App.navigate('roulette','paysim')">Payout Practice</a>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-title">🂡 Poker</div>
          <a class="sidebar-sub-link sidebar-cat-link" data-game="poker" data-mode="tutorial"
             onclick="App.navigate('poker','tutorial')">Tutorial</a>
          <div class="sidebar-sub-title">Practice</div>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="isp"
             onclick="App.navigate('poker','isp')">ISP</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="tcp"
             onclick="App.navigate('poker','tcp')">TCP</a>
          <a class="sidebar-sub-link sidebar-sub-item" data-game="poker" data-mode="thp"
             onclick="App.navigate('poker','thp')">THP</a>
        </div>

      </nav>
    </aside>

    <main id="app" class="main-content"></main>

  </div>
  <script src="/main.js"></script>
</body>
</html>
